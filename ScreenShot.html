<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>截圖模式</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
.topbar { display: flex; align-items: center; width: 100%; max-width: 480px; padding: 14px; gap: 10px; }
.back-btn { background: #1a1a1a; border: none; color: #fff; width: 36px; height: 36px; border-radius: 10px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.topbar-title { font-size: 16px; font-weight: 600; }
.topbar-badge { margin-left: auto; background: #1a1a1a; border-radius: 20px; padding: 4px 12px; font-size: 12px; color: #888; }
#container { position: relative; width: 100%; max-width: 480px; }
video { width: 100%; display: block; }
canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
.rec-indicator { position: absolute; top: 10px; right: 10px; background: rgba(239,68,68,0.85); color: #fff; font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px; display: none; align-items: center; gap: 6px; }
.rec-dot { width: 8px; height: 8px; border-radius: 50%; background: #fff; animation: blink 0.8s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
.countdown { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6); color: #fff; font-size: 13px; font-weight: 600; padding: 4px 10px; border-radius: 20px; display: none; }
.status-bar { width: 100%; max-width: 480px; padding: 10px 14px 4px; }
.status-text { font-size: 13px; color: #f59e0b; min-height: 20px; }
.detect-row { display: flex; gap: 8px; width: 100%; max-width: 480px; padding: 0 14px 6px; }
.detect-item { flex: 1; background: #1a1a1a; border-radius: 10px; padding: 8px 12px; display: flex; align-items: center; gap: 8px; font-size: 12px; color: #555; transition: all 0.3s; }
.detect-item.ok { background: #0f2e1a; color: #22c55e; }
.detect-dot { width: 8px; height: 8px; border-radius: 50%; background: #333; flex-shrink: 0; transition: all 0.3s; }
.detect-item.ok .detect-dot { background: #22c55e; }
.gyro-btn-wrap { width: 100%; max-width: 480px; padding: 0 14px 10px; display: flex; gap: 8px; }
.gyro-btn { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: #f59e0b; font-size: 13px; cursor: pointer; }
.gyro-btn:disabled { color: #22c55e; opacity: 1; }
.recal-btn { padding: 10px 14px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: #888; font-size: 13px; cursor: pointer; display: none; }
.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; max-width: 480px; padding: 0 14px; }
.stat { background: #1a1a1a; border-radius: 10px; padding: 12px; text-align: center; }
.stat-label { font-size: 11px; color: #666; margin-bottom: 4px; }
.stat-value { font-size: 20px; font-weight: 500; }
.stat-unit { font-size: 11px; color: #666; }
.control-row { display: flex; gap: 10px; width: 100%; max-width: 480px; padding: 10px 14px; align-items: center; }
.lr-toggle { display: flex; background: #1a1a1a; border-radius: 10px; overflow: hidden; border: 1px solid #2a2a2a; flex-shrink: 0; }
.lr-btn { padding: 10px 16px; border: none; background: transparent; color: #555; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.lr-btn.active { background: #fff; color: #000; }
.btns { display: flex; gap: 8px; flex: 1; }
button.main { flex: 1; padding: 12px; border-radius: 10px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; background: #fff; color: #000; transition: all 0.2s; }
button.main:disabled { opacity: 0.35; cursor: not-allowed; }
button.main.ready { background: #22c55e; color: #fff; }
button.main.recording { background: #ef4444; color: #fff; }
button.sub { padding: 12px 16px; border-radius: 10px; border: none; font-size: 13px; cursor: pointer; background: #1a1a1a; color: #fff; }
.list-section { width: 100%; max-width: 480px; padding: 4px 14px 0; }
.list-title { font-size: 13px; color: #666; font-weight: 500; margin-bottom: 10px; }
.swing-list { display: flex; flex-direction: column; gap: 8px; }
.swing-item { background: #1a1a1a; border-radius: 12px; overflow: hidden; }
.swing-item.empty { opacity: 0.3; }
.swing-header { display: flex; align-items: center; gap: 10px; padding: 14px; }
.swing-num { background: #2a2a2a; border-radius: 8px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #555; flex-shrink: 0; }
.swing-item.filled .swing-num { background: #fff; color: #000; }
.swing-stats-row { display: flex; gap: 14px; flex: 1; }
.swing-stat { display: flex; flex-direction: column; }
.swing-stat-label { font-size: 10px; color: #555; }
.swing-stat-value { font-size: 14px; font-weight: 600; color: #444; }
.swing-item.filled .swing-stat-value { color: #fff; }
.swing-expand-btn { background: none; border: none; color: #555; font-size: 18px; cursor: pointer; padding: 0 4px; }
.swing-item.filled .swing-expand-btn { color: #888; }
.swing-actions { display: flex; gap: 8px; padding: 0 14px 14px; }
.play-btn { flex: 1; padding: 8px; border-radius: 8px; border: none; background: #252525; color: #888; font-size: 13px; cursor: pointer; }
.swing-item.filled .play-btn { color: #fff; }
.dl-btn { flex: 1; padding: 8px; border-radius: 8px; border: none; background: #252525; color: #444; font-size: 13px; cursor: pointer; }
.swing-item.filled .dl-btn { color: #3b82f6; }
.swing-detail { display: none; border-top: 1px solid #252525; padding: 14px; }
.swing-detail.show { display: block; }
.detail-title { font-size: 11px; color: #555; margin-bottom: 10px; }
.detail-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.detail-card { background: #252525; border-radius: 8px; padding: 10px; text-align: center; }
.detail-card-label { font-size: 10px; color: #666; margin-bottom: 4px; }
.detail-card-value { font-size: 16px; font-weight: 600; color: #fff; }
.detail-card-unit { font-size: 10px; color: #555; }
.detail-card.green  { background: #0f2e1a; }
.detail-card.green .detail-card-value { color: #22c55e; }
.detail-card.yellow { background: #2a2010; }
.detail-card.yellow .detail-card-value { color: #f59e0b; }
.detail-card.red    { background: #2a1010; }
.detail-card.red .detail-card-value { color: #ef4444; }
.modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; z-index: 99; padding: 20px; }
.modal.show { display: flex; }
.modal-box { background: #1a1a1a; border-radius: 16px; padding: 16px; width: 100%; max-width: 440px; }
.modal-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.modal-title { font-size: 15px; font-weight: 600; }
.modal-close { background: #333; border: none; color: #fff; width: 30px; height: 30px; border-radius: 8px; font-size: 16px; cursor: pointer; }
.modal-video { width: 100%; border-radius: 10px; background: #000; }
.modal-dl { width: 100%; margin-top: 10px; padding: 12px; border-radius: 10px; border: none; background: #3b82f6; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; }
/* 過場畫面 */
#splash { position: fixed; inset: 0; background: #0a0a0a; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; gap: 28px; transition: opacity 0.6s ease; }
#splash.fade-out { opacity: 0; pointer-events: none; }
.splash-logo { font-size: 52px; }
.splash-title { font-size: 20px; font-weight: 700; color: #fff; letter-spacing: 2px; }
.splash-spinner { width: 36px; height: 36px; border: 3px solid #222; border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.splash-msg { font-size: 13px; color: #666; min-height: 20px; transition: color 0.3s; }
.splash-msg.ok { color: #22c55e; }
</style>
</head>
<body>

<!-- 過場畫面 -->
<div id="splash">
  <div class="splash-logo">⚾</div>
  <div class="splash-title">截圖模式</div>
  <div class="splash-spinner"></div>
  <div class="splash-msg" id="splash-msg">啟動相機...</div>
</div>

<!-- 主內容 -->
<div id="main-content" style="opacity:0; transition:opacity 0.6s ease; width:100%; display:flex; flex-direction:column; align-items:center; padding-bottom:40px;">

<div class="topbar">
  <button class="back-btn" onclick="location.href='index.html'">←</button>
  <span class="topbar-title">⚾ 截圖模式</span>
  <span style="font-size:10px;color:#888;margin-left:4px;">v0.3.9</span>
  <span class="topbar-badge" id="step-badge">準備中</span>
</div>

<div id="container">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div class="rec-indicator" id="rec-indicator"><div class="rec-dot"></div> REC</div>
  <div class="countdown" id="countdown"></div>
</div>

<div class="status-bar">
  <div class="status-text" id="status">載入中，請稍候...</div>
</div>

<div class="detect-row" id="detect-row">
  <div class="detect-item" id="detect-pose"><div class="detect-dot"></div>🧍 人體偵測</div>
  <div class="detect-item" id="detect-ball"><div class="detect-dot"></div>⚾ 球偵測</div>
  <div class="detect-item" id="detect-level"><div class="detect-dot"></div>📐 水平校準</div>
</div>

<div class="gyro-btn-wrap" id="gyro-btn-wrap">
  <button class="gyro-btn" id="gyro-btn" onclick="requestGyro()">📱 啟用水平感應（iPhone請點此）</button>
  <button class="recal-btn" id="recal-btn" onclick="recalibrate()">🔄 重校</button>
</div>

<div class="stats">
  <div class="stat"><div class="stat-label">擊球初速</div><div class="stat-value" id="velo">—<span class="stat-unit"> km/h</span></div></div>
  <div class="stat"><div class="stat-label">擊球仰角</div><div class="stat-value" id="angle">—<span class="stat-unit">°</span></div></div>
  <div class="stat"><div class="stat-label">預測距離</div><div class="stat-value" id="distance">—<span class="stat-unit"> m</span></div></div>
</div>

<div class="control-row">
  <div class="lr-toggle">
    <button class="lr-btn active" id="btn-right" onclick="setHandedness('right')">右打</button>
    <button class="lr-btn" id="btn-left" onclick="setHandedness('left')">左打</button>
  </div>
  <div class="btns">
    <button class="main" id="mainBtn" onclick="handleMain()" disabled>偵測中...</button>
    <button class="sub" onclick="resetAll()">重置</button>
  </div>
</div>

<div class="list-section">
  <div class="list-title">📋 揮棒紀錄</div>
  <div class="swing-list" id="swing-list"></div>
</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <div class="modal-top">
      <span class="modal-title" id="modal-title">回放</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <video class="modal-video" id="modal-video" controls playsinline></video>
    <button class="modal-dl" id="modal-dl-btn">⬇ 下載影片</button>
  </div>
</div>

</div><!-- /main-content -->

<script type="module">
import { PoseLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

/* ═══════════════════════════════════════════════════════════
   BLOCK 1：設定區 ← 改這裡調參數，不用動其他地方
   ═══════════════════════════════════════════════════════════ */

const MODE_NAME    = '截圖模式';   // 過場畫面標題
const VERSION      = 'v0.3.9';    // 版號

// ── 姿勢模型 ──
const POSE_CONFIG = {
  // 'lite'  = 快但不夠準
  // 'full'  = 準但慢（建議）
  // 'heavy' = 最準但很慢
  model      : 'full',
  // 揮棒觸發速度門檻（越小越靈敏，越大越難觸發）
  swingSpeed : 22,
  // visibility 低於此值的關鍵點忽略不計（過濾身體不在畫面的情況）
  minVis     : 0.5,
};

// ── 球偵測 ──
const BALL_CONFIG = {
  brightness   : 185,  // 亮度門檻（調低可偵測髒球，調低易誤判）
  colorDiff    : 40,   // RGB 最大色差（調高可偵測偏黃偏灰球）
  minPixels    : 15,   // 最少白色像素數
  roundness    : 0.50, // 圓形程度 0~1（調低放寬，調高收緊）
  density      : 0.05, // 像素密度（調低放寬）
  stableFrames : 3,    // 穩定幾幀才算偵測到
  confidenceMax: 50,   // 穩定計數上限
};

// ── 水平校準 ──
const LEVEL_CONFIG = {
  tolerance   : 2.2,  // 水平允許角度誤差（度）
  lockSeconds : 3,    // 穩定幾秒後自動鎖定
  smoothing   : 0.08, // 低通濾波強度（0~1，越小越平滑）
};

// ── 錄影 ──
const RECORD_CONFIG = {
  preSeconds  : 1,  // 揮棒前保留幾秒
  postSeconds : 1,  // 揮棒後保留幾秒
  fps         : 30, // 錄影幀率
  playbackRate: 0.5,// 回放倍速
};

// ── 評分權重 ──
const SCORE_CONFIG = {
  headPenaltyRate : 0.35, // 頭部移動扣分率（每px扣幾分）
  headPenaltyCap  : 25,   // 頭部扣分上限
  hipBonusRate    : 0.15, // 重心位移加分率
  hipBonusCap     : 15,   // 重心加分上限
  veloBonusRate   : 0.25, // 速度加分率
  veloBonusCap    : 20,   // 速度加分上限
  smoothBonusCap  : 15,   // 軌跡平順加分上限
  jitterFactor    : 18,   // 抖動懲罰係數
};

// ── 打擊方向判定 ──
const HIT_CONFIG = {
  threshold : 40, // 手腕與球 X 距離門檻（px）
};


/* ═══════════════════════════════════════════════════════════
   BLOCK 2：DOM 參考 & 全域狀態變數
   （不用動）
   ═══════════════════════════════════════════════════════════ */

const video   = document.getElementById('video');
const canvas  = document.getElementById('canvas');
const ctx     = canvas.getContext('2d');
const status  = document.getElementById('status');
const mainBtn = document.getElementById('mainBtn');

let poseLandmarker = null;
let phase          = 1;   // 1=準備 2=揮棒中
let tracking       = false;
let animId         = null;
let handedness     = 'right';

// 身體偵測狀態
let poseOK         = false;
let poseConfidence = 0;

// 球偵測狀態
let ballOK           = false;
let ballConfidence   = 0;
let ballPos          = null;
let stableBallFrames = 0;

// 陀螺儀狀態
let gyroEnabled     = false;
let rawTilt         = 0;
let smoothTilt      = 0;
let manualOffset    = 0;
let driftCorrection = 0;
let levelOK         = false;
let levelConfidence = 0;

// 水平鎖定狀態
let levelLocked        = false;
let lockedTilt         = 0;
let levelLockCountdown = 0;
let levelLockTimer     = null;

// 揮棒數據
let trail         = [];
let lastWrist     = null;
let maxSpeed      = 0;
let swingDetected = false;
let finalVelo     = 0;
let finalAngle    = 0;
let finalDist     = 0;
let hitPoint      = '—';
let hitType       = '—';
let swingScore    = 0;

// 身體追蹤數據
let headPositions  = [];
let hipPositions   = [];
let anklePositions = [];

// 紀錄列表
let swingRecords = [];
let totalSlots   = 5;

// 錄影 buffer
let recordingBuffer = [];
let bufferRecorder  = null;
let bufferStream    = null;


/* ═══════════════════════════════════════════════════════════
   BLOCK 3：陀螺儀水平校正
   （不用動）
   ═══════════════════════════════════════════════════════════ */

function handleOrientation(e) {
  rawTilt = e.gamma || 0;
}

window.requestGyro = async function () {
  try {
    if (
      typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function'
    ) {
      const perm = await DeviceOrientationEvent.requestPermission();
      if (perm !== 'granted') { status.textContent = '❌ 未允許陀螺儀'; return; }
    }
    window.addEventListener('deviceorientation', handleOrientation);
    gyroEnabled = true;
    const btn = document.getElementById('gyro-btn');
    btn.textContent = '✅ 水平感應已啟用';
    btn.disabled = true;
    document.getElementById('recal-btn').style.display = 'block';
    status.textContent = '📐 請旋轉手機讓兩條線重疊';
  } catch (err) {
    status.textContent = '⚠️ 陀螺儀初始化失敗';
  }
};

function startLevelLockCountdown() {
  if (levelLockTimer !== null) return;
  levelLockCountdown = LEVEL_CONFIG.lockSeconds;
  levelLockTimer = setInterval(() => {
    levelLockCountdown--;
    if (levelLockCountdown <= 0) {
      clearInterval(levelLockTimer);
      levelLockTimer = null;
      lockedTilt  = smoothTilt + manualOffset + driftCorrection;
      levelLocked = true;
      document.getElementById('detect-level').textContent = '🔒 水平已鎖定';
      document.getElementById('recal-btn').style.display = 'none';
      status.textContent = '🔒 水平鎖定！請按「開始揮棒」';
    }
  }, 1000);
}

function cancelLevelLockCountdown() {
  if (levelLockTimer !== null) { clearInterval(levelLockTimer); levelLockTimer = null; }
  levelLockCountdown = 0;
}

window.recalibrate = function () {
  if (!gyroEnabled) return;
  manualOffset    = -(smoothTilt + driftCorrection);
  levelLocked     = false;
  levelConfidence = 0;
  cancelLevelLockCountdown();
  document.getElementById('detect-level').innerHTML = '<div class="detect-dot"></div>📐 水平校準';
  document.getElementById('recal-btn').style.display = 'block';
  status.textContent = '✅ 已重新校正，重新穩定中...';
};

function drawLevelSystem(cw, ch) {
  const midY    = ch * 0.5;
  const lineLen = cw * 0.82;

  smoothTilt += (rawTilt - smoothTilt) * LEVEL_CONFIG.smoothing;
  driftCorrection *= 0.999;

  const finalTilt = levelLocked
    ? lockedTilt
    : (smoothTilt + manualOffset + driftCorrection);
  const tiltOK = Math.abs(finalTilt) < LEVEL_CONFIG.tolerance;

  if (!levelLocked) {
    if (tiltOK) levelConfidence = Math.min(levelConfidence + 1, BALL_CONFIG.confidenceMax);
    else        levelConfidence = Math.max(levelConfidence - 1, 0);
    levelOK = levelConfidence >= BALL_CONFIG.confidenceMax;
    if (levelOK) startLevelLockCountdown();
    else         cancelLevelLockCountdown();
  }

  // 白色基準線
  ctx.save();
  ctx.translate(cw / 2, midY);
  ctx.beginPath(); ctx.moveTo(-lineLen/2, 0); ctx.lineTo(lineLen/2, 0);
  ctx.strokeStyle = 'rgba(255,255,255,0.28)'; ctx.lineWidth = 7; ctx.stroke();
  ctx.restore();

  // 動態傾斜線
  if (gyroEnabled) {
    const rad    = finalTilt * Math.PI / 180;
    const offset = Math.sin(rad) * lineLen * 0.5;
    const color  = levelLocked ? '#3b82f6' : (tiltOK ? '#22c55e' : '#f59e0b');
    ctx.save();
    ctx.translate(cw / 2, midY);
    ctx.beginPath(); ctx.moveTo(-lineLen/2, offset); ctx.lineTo(lineLen/2, -offset);
    ctx.strokeStyle = color; ctx.lineWidth = levelLocked ? 5 : 4;
    ctx.shadowBlur = 12; ctx.shadowColor = color; ctx.stroke();
    ctx.restore();
    // 倒數數字
    if (!levelLocked && levelLockTimer !== null && levelLockCountdown > 0) {
      ctx.save();
      ctx.font = 'bold 28px sans-serif'; ctx.fillStyle = '#22c55e';
      ctx.textAlign = 'center'; ctx.shadowBlur = 10; ctx.shadowColor = '#22c55e';
      ctx.fillText(levelLockCountdown, cw / 2, midY - 20);
      ctx.restore();
    }
  } else {
    levelConfidence = 0;
  }

  // 中央準星
  ctx.beginPath(); ctx.arc(cw / 2, midY, 5, 0, Math.PI * 2);
  ctx.fillStyle = levelLocked ? '#3b82f6' : ((tiltOK && gyroEnabled) ? '#22c55e' : '#fff');
  ctx.fill();

  if (!levelLocked) document.getElementById('detect-level').classList.toggle('ok', levelOK);
}


/* ═══════════════════════════════════════════════════════════
   BLOCK 4：人體偵測
   （不用動；調靈敏度改 POSE_CONFIG.minVis）
   ═══════════════════════════════════════════════════════════ */

function checkPoseInFrame(lm, cw, ch) {
  // 檢查關鍵點：鼻子(0)、左右肩(11,12)、左右臀(23,24)
  const keyPoints = [0, 11, 12, 23, 24];
  let visibleCount = 0;
  for (const idx of keyPoints) {
    const pt = lm[idx];
    if (pt && pt.visibility > POSE_CONFIG.minVis) visibleCount++;
  }
  // 至少 4/5 個關鍵點可見才算人在畫面裡
  return visibleCount >= 4;
}

function updatePoseDetect(inFrame) {
  if (inFrame) poseConfidence = Math.min(poseConfidence + 1, BALL_CONFIG.confidenceMax);
  else         poseConfidence = Math.max(poseConfidence - 2, 0);
  const newPoseOK = poseConfidence >= BALL_CONFIG.confidenceMax;
  if (newPoseOK !== poseOK) {
    poseOK = newPoseOK;
    document.getElementById('detect-pose').classList.toggle('ok', poseOK);
  }
}


/* ═══════════════════════════════════════════════════════════
   BLOCK 5：球偵測
   （調參數改 BALL_CONFIG）
   ═══════════════════════════════════════════════════════════ */

function detectWhiteBall(imageData, cw, ch) {
  const cx = cw / 2, cy = ch / 2;
  const baseR = Math.min(cw, ch) * 0.22;
  const data  = imageData.data;
  let count = 0, bx = 0, by = 0;
  let minX = cw, maxX = 0, minY = ch, maxY = 0;

  for (let y = cy - baseR; y < cy + baseR; y += 2) {
    for (let x = cx - baseR; x < cx + baseR; x += 2) {
      const xi = x|0, yi = y|0;
      if (xi < 0 || yi < 0 || xi >= cw || yi >= ch) continue;
      const i = (yi * cw + xi) * 4;
      const r = data[i], g = data[i+1], b = data[i+2];
      const brightness = (r + g + b) / 3;
      // ← 調 BALL_CONFIG.brightness / colorDiff
      const isWhite = brightness > BALL_CONFIG.brightness &&
                      Math.max(r,g,b) - Math.min(r,g,b) < BALL_CONFIG.colorDiff;
      if (!isWhite) continue;
      count++; bx += x; by += y;
      if (x < minX) minX = x; if (x > maxX) maxX = x;
      if (y < minY) minY = y; if (y > maxY) maxY = y;
    }
  }

  if (count < BALL_CONFIG.minPixels) return { found: false };
  const w = maxX - minX, h = maxY - minY;
  if (!w || !h) return { found: false };
  const roundness = Math.min(w,h) / Math.max(w,h);
  const density   = count / (w * h);
  // ← 調 BALL_CONFIG.roundness / density
  if (roundness < BALL_CONFIG.roundness) return { found: false };
  if (density   < BALL_CONFIG.density)   return { found: false };

  return { found: true, x: bx / count, y: by / count };
}


/* ═══════════════════════════════════════════════════════════
   BLOCK 6：揮棒分析（速度、仰角、評分、打擊方向）
   （調評分權重改 SCORE_CONFIG；調方向門檻改 HIT_CONFIG）
   ═══════════════════════════════════════════════════════════ */

function calcBodyMetrics() {
  let headMove = 0, hipMove = 0, ankleSpan = 0;
  if (headPositions.length > 1) {
    const xs = headPositions.map(p => p.x);
    headMove = Math.round(Math.max(...xs) - Math.min(...xs));
  }
  if (hipPositions.length > 1) {
    const xs = hipPositions.map(p => p.x);
    hipMove = Math.round(Math.max(...xs) - Math.min(...xs));
  }
  if (anklePositions.length > 1) {
    const spans = anklePositions.map(p => Math.abs(p.lx - p.rx));
    ankleSpan = Math.round(Math.max(...spans));
  }
  return { headMove, hipMove, ankleSpan };
}

function calculateSwingScore(headMove, hipMove) {
  let score = 100;
  // 頭部穩定（扣分）
  score -= Math.min(headMove * SCORE_CONFIG.headPenaltyRate, SCORE_CONFIG.headPenaltyCap);
  // 重心轉移（加分）
  score += Math.min(hipMove  * SCORE_CONFIG.hipBonusRate,   SCORE_CONFIG.hipBonusCap);
  // 揮棒速度（加分）
  score += Math.min(finalVelo * SCORE_CONFIG.veloBonusRate, SCORE_CONFIG.veloBonusCap);
  // 軌跡平順（加分）
  let smoothness = 100;
  if (trail.length > 5) {
    let jitter = 0;
    for (let i = 2; i < trail.length; i++) {
      const a1 = Math.atan2(trail[i-1].y - trail[i-2].y, trail[i-1].x - trail[i-2].x);
      const a2 = Math.atan2(trail[i].y   - trail[i-1].y, trail[i].x   - trail[i-1].x);
      jitter += Math.abs(a2 - a1);
    }
    smoothness = Math.max(0, 100 - jitter * SCORE_CONFIG.jitterFactor);
  }
  score += smoothness * (SCORE_CONFIG.smoothBonusCap / 100);
  return Math.max(0, Math.min(100, Math.round(score)));
}

function calcHitPoint() {
  if (!ballPos || finalVelo <= 0) return { hitPoint: '—', hitType: '—' };
  const diff = lastWrist ? (lastWrist.x - ballPos.x) : 0;
  const dir  = handedness === 'right' ? diff : -diff;
  // ← 調 HIT_CONFIG.threshold
  if      (dir < -HIT_CONFIG.threshold) return { hitPoint: 'Early', hitType: 'Pull'   };
  else if (dir >  HIT_CONFIG.threshold) return { hitPoint: 'Late',  hitType: 'Push'   };
  else                                   return { hitPoint: 'Perfect', hitType: 'Center' };
}

function getColor(speed) {
  if (speed < 8)  return '#3b82f6';
  if (speed < 20) return '#f59e0b';
  return '#ef4444';
}


/* ═══════════════════════════════════════════════════════════
   BLOCK 7：Buffer 錄影系統
   （調時間改 RECORD_CONFIG）
   ═══════════════════════════════════════════════════════════ */

function startBufferRecording() {
  if (bufferRecorder && bufferRecorder.state !== 'inactive') bufferRecorder.stop();
  recordingBuffer = [];
  let mime = '';
  if (MediaRecorder.isTypeSupported('video/webm;codecs=vp9')) mime = 'video/webm;codecs=vp9';
  else if (MediaRecorder.isTypeSupported('video/webm'))       mime = 'video/webm';
  else if (MediaRecorder.isTypeSupported('video/mp4'))        mime = 'video/mp4';
  bufferStream   = canvas.captureStream(RECORD_CONFIG.fps);
  bufferRecorder = new MediaRecorder(bufferStream, mime ? { mimeType: mime } : {});
  bufferRecorder.ondataavailable = e => {
    if (e.data.size > 0) {
      recordingBuffer.push({ time: Date.now(), blob: e.data });
      const keep = (RECORD_CONFIG.preSeconds + RECORD_CONFIG.postSeconds + 1) * 1000;
      recordingBuffer = recordingBuffer.filter(c => c.time > Date.now() - keep);
    }
  };
  bufferRecorder.start(100);
}

function triggerHighlightRecording() {
  status.textContent = '🔥 擊球！';
  const triggerTime = Date.now();
  setTimeout(() => exportHighlightClip(triggerTime), RECORD_CONFIG.postSeconds * 1000);
}

function exportHighlightClip(triggerTime) {
  const start      = triggerTime - RECORD_CONFIG.preSeconds  * 1000;
  const end        = triggerTime + RECORD_CONFIG.postSeconds * 1000;
  const clipChunks = recordingBuffer.filter(c => c.time >= start && c.time <= end);
  const mimeType   = (bufferRecorder && bufferRecorder.mimeType) || 'video/webm';
  const finalBlob  = new Blob(clipChunks.map(c => c.blob), { type: mimeType });
  const url        = URL.createObjectURL(finalBlob);
  if (bufferRecorder && bufferRecorder.state !== 'inactive') {
    bufferRecorder.stop();
    bufferRecorder = null;
  }
  saveRecord(url, finalBlob);
}

/* ═══════════════════════════════════════════════════════════
   BLOCK 9：saveRecord & 狀態重置
   （不用動）
   ═══════════════════════════════════════════════════════════ */

function saveRecord(url, blob) {
  const num  = swingRecords.length + 1;
  const body = calcBodyMetrics();
  const { headMove, hipMove, ankleSpan } = body;
  const { hitPoint: hp, hitType: ht } = calcHitPoint();
  hitPoint   = hp; hitType = ht;
  swingScore = calculateSwingScore(headMove, hipMove);

  const record = {
    num, velo: finalVelo, angle: finalAngle, dist: finalDist,
    headMove, hipMove, ankleSpan, hitPoint, hitType, swingScore,
    url, blob
  };
  swingRecords.push(record);
  fillSlot(record);

  // 重置揮棒狀態
  trail = []; lastWrist = null; maxSpeed = 0; swingDetected = false;
  finalVelo = 0; finalAngle = 0; finalDist = 0;
  hitPoint = '—'; hitType = '—'; swingScore = 0;
  headPositions = []; hipPositions = []; anklePositions = [];

  // 重置球偵測（保留水平鎖定 & 陀螺儀校正值）
  ballOK = false; ballConfidence = 0; ballPos = null; stableBallFrames = 0;
  poseOK = false; poseConfidence = 0;

  document.getElementById('detect-row').style.display    = 'flex';
  document.getElementById('gyro-btn-wrap').style.display = 'flex';
  document.getElementById('detect-ball').classList.remove('ok');
  document.getElementById('detect-pose').classList.remove('ok');
  document.getElementById('step-badge').textContent = '準備中';
  mainBtn.textContent = '偵測中...';
  mainBtn.disabled    = true;
  mainBtn.className   = 'main';
  phase = 1;
  status.textContent = `✅ 第${num}次完成！`;

  startBufferRecording();
}

/* ═══════════════════════════════════════════════════════════
   BLOCK 11：相機 & MediaPipe 初始化
   （換模型改 POSE_CONFIG.model）
   ═══════════════════════════════════════════════════════════ */

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: 640, height: 480 }
    });
    video.srcObject = stream;
    await new Promise(r => video.onloadedmetadata = r);
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
  } catch(e) {
    status.textContent = '⚠️ 無法開啟鏡頭，請允許相機權限';
  }
}

async function init() {
  try {
    const vision = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
    );
    // ← 換模型改 POSE_CONFIG.model（lite / full / heavy）
    const modelUrl = `https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_${POSE_CONFIG.model}/float16/1/pose_landmarker_${POSE_CONFIG.model}.task`;
    poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
      baseOptions: { modelAssetPath: modelUrl, delegate: "GPU" },
      runningMode: "VIDEO",
      numPoses: 1
    });
    tracking = true;
    status.textContent = '🎯 請站入畫面，放好球，並啟用水平感應';
    loop();
  } catch(e) {
    status.textContent = '⚠️ 載入失敗，請重新整理';
  }
}


/* ═══════════════════════════════════════════════════════════
   BLOCK 12：主循環
   （不用動）
   ═══════════════════════════════════════════════════════════ */

function loop() {
  if (!tracking) return;
  if (video.readyState < 2) { animId = requestAnimationFrame(loop); return; }

  const cw = canvas.width, ch = canvas.height;
  ctx.clearRect(0, 0, cw, ch);
  ctx.drawImage(video, 0, 0, cw, ch);

  // ── Phase 1：準備階段 ────────────────────────────────────
  if (phase === 1) {

    // 人體偵測（phase 1 用 poseLandmarker 偵測是否在畫面裡）
    const now     = performance.now();
    const results = poseLandmarker ? poseLandmarker.detectForVideo(video, now) : null;
    const inFrame = results && results.landmarks && results.landmarks.length > 0
      ? checkPoseInFrame(results.landmarks[0], cw, ch)
      : false;
    updatePoseDetect(inFrame);

    // 球偵測
    const tmp  = document.createElement('canvas');
    tmp.width  = cw; tmp.height = ch;
    const tCtx = tmp.getContext('2d');
    tCtx.drawImage(video, 0, 0, cw, ch);
    const imageData = tCtx.getImageData(0, 0, cw, ch);
    const ball = detectWhiteBall(imageData, cw, ch);

    if (ball.found) stableBallFrames = Math.min(stableBallFrames + 1, 10);
    else            stableBallFrames = Math.max(stableBallFrames - 2, 0);

    const tx = ball.found ? ball.x : cw / 2;
    const ty = ball.found ? ball.y : ch / 2;
    if (!ballPos) ballPos = { x: tx, y: ty };
    ballPos.x += (tx - ballPos.x) * 0.12;
    ballPos.y += (ty - ballPos.y) * 0.12;

    ctx.beginPath();
    ctx.arc(ballPos.x, ballPos.y, 34, 0, Math.PI * 2);
    ctx.strokeStyle = ball.found ? '#ef4444' : 'rgba(255,60,60,0.25)';
    ctx.lineWidth = 3; ctx.stroke();

    if (ball.found) ballConfidence = Math.min(ballConfidence + 1, BALL_CONFIG.confidenceMax);
    else            ballConfidence = Math.max(ballConfidence - 1, 0);
    const newBallOK = ballConfidence >= BALL_CONFIG.confidenceMax;
    if (newBallOK !== ballOK) {
      ballOK = newBallOK;
      document.getElementById('detect-ball').classList.toggle('ok', ballOK);
    }

    // 水平校準
    drawLevelSystem(cw, ch);

    // 主按鈕狀態：水平鎖定 + 人體在畫面 才能開始
    if (levelLocked && poseOK) {
      mainBtn.disabled    = false;
      mainBtn.textContent = '✅ 開始揮棒';
      mainBtn.className   = 'main ready';
      document.getElementById('step-badge').textContent = '準備完成';
      if (ballOK) status.textContent = '✅ 準備完成！球、人體、水平全部 OK';
      else        status.textContent = '✅ 準備完成（球偵測輔助）';
    } else if (levelOK && levelLockTimer !== null) {
      mainBtn.disabled    = true;
      mainBtn.textContent = `🔒 鎖定中 ${levelLockCountdown}s...`;
      mainBtn.className   = 'main';
    } else {
      mainBtn.disabled    = true;
      mainBtn.textContent = '偵測中...';
      mainBtn.className   = 'main';
      if (!gyroEnabled)   status.textContent = '📱 請啟用水平感應';
      else if (!poseOK)   status.textContent = `🧍 請站入畫面 ${Math.round(poseConfidence/BALL_CONFIG.confidenceMax*100)}%`;
      else                status.textContent = `📐 請讓兩條線重疊 ${Math.round(levelConfidence/BALL_CONFIG.confidenceMax*100)}%`;
    }

  // ── Phase 2：揮棒階段 ────────────────────────────────────
  } else if (phase === 2) {

    const now     = performance.now();
    const results = poseLandmarker ? poseLandmarker.detectForVideo(video, now) : null;

    if (results && results.landmarks && results.landmarks.length > 0) {
      const lm       = results.landmarks[0];
      const wristIdx = handedness === 'right' ? 16 : 15;
      const elbowIdx = handedness === 'right' ? 14 : 13;
      const wrist = lm[wristIdx], elbow = lm[elbowIdx];
      const nose  = lm[0];
      const hipL  = lm[23], hipR  = lm[24];
      const ankleL = lm[27], ankleR = lm[28];

      // visibility 過濾（身體不在畫面時忽略該點）
      if (nose   && nose.visibility   > POSE_CONFIG.minVis)
        headPositions.push({ x: nose.x * cw, y: nose.y * ch });
      if (hipL   && hipR &&
          hipL.visibility > POSE_CONFIG.minVis &&
          hipR.visibility > POSE_CONFIG.minVis)
        hipPositions.push({ x: ((hipL.x + hipR.x) / 2) * cw });
      if (ankleL && ankleR &&
          ankleL.visibility > POSE_CONFIG.minVis &&
          ankleR.visibility > POSE_CONFIG.minVis)
        anklePositions.push({ lx: ankleL.x * cw, rx: ankleR.x * cw });

      if (wrist && wrist.visibility > POSE_CONFIG.minVis) {
        const wx = wrist.x * cw, wy = wrist.y * ch;
        let speed = 0;
        if (lastWrist) {
          const dx = wx - lastWrist.x, dy = wy - lastWrist.y;
          speed = Math.sqrt(dx * dx + dy * dy);
          if (speed > maxSpeed) maxSpeed = speed;
        }
        trail.push({ x: wx, y: wy, speed });
        if (trail.length > 80) trail.shift();
        lastWrist = { x: wx, y: wy };

        // 揮棒軌跡線
        for (let i = 1; i < trail.length; i++) {
          const t = trail[i], p = trail[i - 1];
          ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(t.x, t.y);
          ctx.strokeStyle = getColor(t.speed);
          ctx.lineWidth   = t.speed > 20 ? 5 : 3;
          ctx.globalAlpha = (i / trail.length) * 0.85;
          ctx.stroke();
          ctx.globalAlpha = 1;
        }
        ctx.beginPath(); ctx.arc(wx, wy, 7, 0, Math.PI * 2);
        ctx.fillStyle = getColor(speed); ctx.fill();

        // 揮棒觸發
        if (!swingDetected && speed > POSE_CONFIG.swingSpeed) {
          swingDetected = true;
          triggerHighlightRecording();
        }

        // 計算初速、仰角、距離
        if (elbow && elbow.visibility > POSE_CONFIG.minVis) {
          const ex = elbow.x * cw, ey = elbow.y * ch;
          finalAngle = Math.round(Math.atan2(ey - wy, wx - ex) * 180 / Math.PI);
        }
        finalVelo = Math.round(maxSpeed * 60 * 0.005 * 3.6);
        const rad  = Math.abs(finalAngle) * Math.PI / 180;
        const v0ms = maxSpeed * 60 * 0.005;
        finalDist  = Math.round((v0ms * v0ms * Math.sin(2 * rad)) / 9.8);

        document.getElementById('velo').innerHTML     = `${finalVelo}<span class="stat-unit"> km/h</span>`;
        document.getElementById('angle').innerHTML    = `${finalAngle}<span class="stat-unit">°</span>`;
        document.getElementById('distance').innerHTML = `${finalDist > 0 ? finalDist : '—'}<span class="stat-unit">${finalDist > 0 ? ' m' : ''}</span>`;
        status.textContent = speed > 20 ? '🔴 擊球！' : speed > 8 ? '🟡 加速中' : '🔵 準備期';
      }
    }
  }

  animId = requestAnimationFrame(loop);
}

  splash.classList.add('fade-out');
  main.style.opacity = '1';
  setTimeout(() => { splash.style.display = 'none'; }, 650);
}
