  .modal {

    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    align-items: center;
    justify-content: center;
    z-index: 99;
  }
  .modal.show { display: flex; }
  .modal-box {
    background: #1a1a1a;

    padding: 28px 32px;

  .modal-icon { font-size: 36px; margin-bottom: 10px; }
  .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .modal-sub { font-size: 13px; color: #666; }
</style>
