<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T座模式</title>

<style>
body { margin:0; background:#0a0a0a; color:#fff; font-family:sans-serif; display:flex; flex-direction:column; align-items:center; }
video, canvas { width:100%; max-width:480px; }
canvas { position:absolute; top:0; left:0; }
#container { position:relative; width:100%; max-width:480px; }
button { margin:4px; padding:10px; }
.stat { margin:5px; }
</style>
</head>

<body>

<div id="container">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
</div>

<div class="stat" id="status">載入中...</div>

<div>
  <button onclick="requestGyro()">啟用陀螺儀</button>
  <button onclick="handleMain()">開始</button>
  <button onclick="resetAll()">重置</button>
</div>

<div class="stat" id="velo">速度</div>
<div class="stat" id="angle">角度</div>
<div class="stat" id="distance">距離</div>

<script type="module">
import { PoseLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const status = document.getElementById("status");

let poseLandmarker;
let phase = 1;

// ====== gyro ======
let deviceTilt = 0;
let gyroEnabled = false;

// ====== ball tracking ======
let ballOK = false;
let ballConfidence = 0;
let ballPos = null;
let pixelsPerCm = 0;
let stableBallFrames = 0;
let lastBall = null;

// ====== swing ======
let trail = [];
let lastWrist = null;
let maxSpeed = 0;
let lastTime = 0;

// ====== recording ======
let recorder;
let chunks = [];
let isRecording = false;

// ===================== CAMERA =====================
async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  });

  video.srcObject = stream;
  await new Promise(r => video.onloadedmetadata = r);

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
}

// ===================== GYRO =====================
window.requestGyro = function () {
  DeviceOrientationEvent.requestPermission?.().then(res => {
    if (res === "granted") {
      window.addEventListener("deviceorientation", e => {
        deviceTilt = e.gamma || 0;
      });
      gyroEnabled = true;
      status.textContent = "陀螺儀啟用";
    }
  }).catch(() => {
    window.addEventListener("deviceorientation", e => {
      deviceTilt = e.gamma || 0;
    });
    gyroEnabled = true;
  });
};

// ===================== BALL DETECTION =====================
function detectWhiteBall(imageData, cw, ch) {
  const cx = cw / 2;
  const cy = ch / 2;
  const baseR = Math.min(cw, ch) * 0.22;

  const data = imageData.data;

  let count = 0;
  let bx = 0, by = 0;

  let minX = cw, maxX = 0;
  let minY = ch, maxY = 0;

  for (let y = cy - baseR; y < cy + baseR; y += 2) {
    for (let x = cx - baseR; x < cx + baseR; x += 2) {

      const xi = x | 0;
      const yi = y | 0;
      if (xi < 0 || yi < 0 || xi >= cw || yi >= ch) continue;

      const i = (yi * cw + xi) * 4;
      const r = data[i], g = data[i + 1], b = data[i + 2];

      const brightness = (r + g + b) / 3;
      const isWhite =
        brightness > 200 &&
        Math.max(r, g, b) - Math.min(r, g, b) < 35;

      if (!isWhite) continue;

      count++;
      bx += x;
      by += y;

      if (x < minX) minX = x;
      if (x > maxX) maxX = x;
      if (y < minY) minY = y;
      if (y > maxY) maxY = y;
    }
  }

  if (count < 25) return { found: false };

  const w = maxX - minX;
  const h = maxY - minY;
  if (w === 0 || h === 0) return { found: false };

  const roundness = Math.min(w, h) / Math.max(w, h);
  if (roundness < 0.65) return { found: false };

  return {
    found: true,
    x: bx / count,
    y: by / count,
    diameter: Math.max(w, h)
  };
}

// ===================== RECORD =====================
function startRecording(stream) {
  chunks = [];
  recorder = new MediaRecorder(stream);

  recorder.ondataavailable = e => chunks.push(e.data);
  recorder.start();
  isRecording = true;
}

function stopRecording() {
  if (!recorder) return;
  recorder.stop();
  isRecording = false;
}

// ===================== LOOP =====================
function loop() {
  const cw = canvas.width;
  const ch = canvas.height;

  ctx.drawImage(video, 0, 0, cw, ch);

  const imageData = ctx.getImageData(0, 0, cw, ch);

  // ===== BALL =====
  const ball = detectWhiteBall(imageData, cw, ch);

  if (ball.found) {
    stableBallFrames++;
    lastBall = ball;
  } else {
    stableBallFrames = Math.max(0, stableBallFrames - 1);
  }

  ballOK = stableBallFrames > 3;

  const tx = ball.found ? ball.x : cw / 2;
  const ty = ball.found ? ball.y : ch / 2;

  if (!ballPos) ballPos = { x: tx, y: ty };

  ballPos.x += (tx - ballPos.x) * 0.2;
  ballPos.y += (ty - ballPos.y) * 0.2;

  ctx.beginPath();
  ctx.arc(ballPos.x, ballPos.y, 30, 0, Math.PI * 2);
  ctx.strokeStyle = ballOK ? "red" : "gray";
  ctx.stroke();

  // ===== STATUS =====
  status.textContent = ballOK
    ? "球穩定"
    : "找球中";

  // ===== SWING =====
  const now = performance.now();

  const results = poseLandmarker?.detectForVideo(video, now);

  if (results?.landmarks?.length) {
    const lm = results.landmarks[0];

    const wrist = lm[16];

    if (wrist) {
      const wx = wrist.x * cw;
      const wy = wrist.y * ch;

      let speed = 0;

      if (lastWrist) {
        const dx = wx - lastWrist.x;
        const dy = wy - lastWrist.y;
        const dt = (now - lastTime) / 1000;
        speed = Math.sqrt(dx * dx + dy * dy) / dt;
      }

      trail.push({ wx, wy });

      if (trail.length > 50) trail.shift();

      lastWrist = { x: wx, y: wy };
      lastTime = now;

      ctx.beginPath();
      ctx.arc(wx, wy, 6, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  requestAnimationFrame(loop);
}

// ===================== INIT =====================
async function init() {
  const vision = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
  );

  poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath:
        "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task"
    },
    runningMode: "VIDEO"
  });

  status.textContent = "啟動完成";
  loop();
}

// ===================== BUTTON =====================
window.handleMain = function () {
  status.textContent = "開始揮棒";
};

window.resetAll = function () {
  stableBallFrames = 0;
  ballOK = false;
  trail = [];
  status.textContent = "重置完成";
};

// ===================== START =====================
await startCamera();
await init();

</script>
</body>
</html>
