<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T座模式</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
  .topbar { display: flex; align-items: center; width: 100%; max-width: 480px; padding: 14px; gap: 10px; }
  .back-btn { background: #1a1a1a; border: none; color: #fff; width: 36px; height: 36px; border-radius: 10px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .topbar-title { font-size: 16px; font-weight: 600; }
  .topbar-badge { margin-left: auto; background: #1a1a1a; border-radius: 20px; padding: 4px 12px; font-size: 12px; color: #888; }

  #container { position: relative; width: 100%; max-width: 480px; }
  video { width: 100%; display: block; }
  canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

  .status-bar { width: 100%; max-width: 480px; padding: 10px 14px; }
  .status-text { font-size: 13px; color: #f59e0b; min-height: 20px; }

  .phase-indicator { display: flex; gap: 8px; width: 100%; max-width: 480px; padding: 0 14px 10px; }
  .phase { flex: 1; padding: 8px; border-radius: 10px; background: #1a1a1a; text-align: center; font-size: 11px; color: #555; transition: all 0.3s; }
  .phase.active { color: #fff; }
  .phase-1.active { background: #1d3a5f; color: #3b82f6; }
  .phase-2.active { background: #3d2800; color: #f59e0b; }
  .phase-3.active { background: #3d0000; color: #ef4444; }

  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; max-width: 480px; padding: 0 14px; }
  .stat { background: #1a1a1a; border-radius: 10px; padding: 12px; text-align: center; }
  .stat-label { font-size: 11px; color: #666; margin-bottom: 4px; }
  .stat-value { font-size: 20px; font-weight: 500; }
  .stat-unit { font-size: 11px; color: #666; margin-left: 2px; }

  .legend { display: flex; gap: 14px; padding: 10px 14px; }
  .leg { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #666; }
  .dot { width: 18px; height: 3px; border-radius: 2px; }

  .btns { display: flex; gap: 10px; padding: 10px 14px 24px; width: 100%; max-width: 480px; }
  button.main { flex: 2; padding: 14px; border-radius: 12px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; background: #fff; color: #000; }
  button.sub { flex: 1; padding: 14px; border-radius: 12px; border: none; font-size: 14px; cursor: pointer; background: #1a1a1a; color: #fff; }
  button.recording { background: #ef4444; color: #fff; }
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="location.href='index.html'">←</button>
  <span class="topbar-title">⚾ T座模式</span>
  <span class="topbar-badge" id="step-badge">步驟 1／3</span>
</div>

<div id="container">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
</div>

<div class="status-bar">
  <div class="status-text" id="status">載入中，請稍候...</div>
</div>

<div class="phase-indicator">
  <div class="phase phase-1 active" id="ph1">① 對準球</div>
  <div class="phase phase-2" id="ph2">② 校準水平</div>
  <div class="phase phase-3" id="ph3">③ 揮棒分析</div>
</div>

<div class="stats">
  <div class="stat">
    <div class="stat-label">擊球初速</div>
    <div class="stat-value" id="velo">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">擊球仰角</div>
    <div class="stat-value" id="angle">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">預測距離</div>
    <div class="stat-value" id="distance">—</div>
  </div>
</div>

<div class="legend">
  <div class="leg"><div class="dot" style="background:#3b82f6"></div>準備期</div>
  <div class="leg"><div class="dot" style="background:#f59e0b"></div>加速期</div>
  <div class="leg"><div class="dot" style="background:#ef4444"></div>擊球點</div>
</div>

<div class="btns">
  <button class="main" id="mainBtn" onclick="handleMain()">開始偵測球</button>
  <button class="sub" onclick="resetAll()">重置</button>
</div>

<script type="module">
import { PoseLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const status = document.getElementById('status');

let poseLandmarker = null;
let phase = 1; // 1=對準球, 2=校準水平, 3=揮棒分析
let tracking = false;
let animId = null;

// 球的追蹤
let ballPos = null;
let ballDetected = false;
let ballConfidence = 0;

// 水平校準
let isLevel = false;
let levelProgress = 0;

// 揮棒軌跡
let trail = [];
let lastWrist = null;
let maxSpeed = 0;
let swingStart = null;
let swingDetected = false;

// 初始化 MediaPipe
async function init() {
  try {
    const vision = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
    );
    poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",
        delegate: "GPU"
      },
      runningMode: "VIDEO",
      numPoses: 1
    });
    status.textContent = '✅ 準備完成，點擊「開始偵測球」';
  } catch(e) {
    status.textContent = '⚠️ 載入失敗，請重新整理';
  }
}

// 開啟鏡頭
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: 640, height: 480 }
    });
    video.srcObject = stream;
    await new Promise(r => video.onloadedmetadata = r);
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
  } catch(e) {
    status.textContent = '⚠️ 無法開啟鏡頭，請允許相機權限';
  }
}

window.handleMain = function() {
  if (phase === 1) {
    tracking = true;
    document.getElementById('mainBtn').textContent = '偵測中...';
    document.getElementById('mainBtn').classList.add('recording');
    status.textContent = '🎯 請將球放置於畫面中央';
    loop();
  } else if (phase === 2) {
    status.textContent = '📐 請確認棒子與地面平行';
  } else if (phase === 3) {
    swingStart = Date.now();
    maxSpeed = 0;
    trail = [];
    swingDetected = false;
    status.textContent = '🔴 準備好後揮棒！';
    document.getElementById('mainBtn').textContent = '停止';
  }
}

window.resetAll = function() {
  phase = 1;
  tracking = false;
  ballDetected = false;
  ballConfidence = 0;
  isLevel = false;
  levelProgress = 0;
  trail = [];
  lastWrist = null;
  maxSpeed = 0;
  swingDetected = false;
  cancelAnimationFrame(animId);
  updatePhaseUI();
  document.getElementById('mainBtn').textContent = '開始偵測球';
  document.getElementById('mainBtn').classList.remove('recording');
  document.getElementById('velo').textContent = '—';
  document.getElementById('angle').textContent = '—';
  document.getElementById('distance').textContent = '—';
  document.getElementById('step-badge').textContent = '步驟 1／3';
  status.textContent = '✅ 已重置，點擊「開始偵測球」';
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function updatePhaseUI() {
  ['ph1','ph2','ph3'].forEach((id, i) => {
    document.getElementById(id).classList.toggle('active', i + 1 === phase);
  });
  document.getElementById('step-badge').textContent = `步驟 ${phase}／3`;
}

function getColor(speed) {
  if (speed < 8) return '#3b82f6';
  if (speed < 20) return '#f59e0b';
  return '#ef4444';
}

// 簡易球偵測：找畫面中央的圓形亮點
function detectBall(imageData, cw, ch) {
  const cx = cw / 2, cy = ch / 2;
  const searchR = Math.min(cw, ch) * 0.25;
  const data = imageData.data;
  let brightCount = 0;
  let bx = 0, by = 0;

  for (let y = cy - searchR; y < cy + searchR; y += 4) {
    for (let x = cx - searchR; x < cx + searchR; x += 4) {
      const i = (Math.floor(y) * cw + Math.floor(x)) * 4;
      const r = data[i], g = data[i+1], b = data[i+2];
      const brightness = (r + g + b) / 3;
      const dist = Math.sqrt((x-cx)**2 + (y-cy)**2);
      if (brightness > 160 && dist < searchR) {
        brightCount++;
        bx += x; by += y;
      }
    }
  }

  if (brightCount > 10) {
    return { x: bx / brightCount, y: by / brightCount, found: true };
  }
  return { x: cx, y: cy, found: false };
}

function loop() {
  if (!tracking) return;
  if (video.readyState < 2) { animId = requestAnimationFrame(loop); return; }

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const cw = canvas.width, ch = canvas.height;

  // 從 video 取得畫面做球偵測
  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = cw; tempCanvas.height = ch;
  const tempCtx = tempCanvas.getContext('2d');
  tempCtx.drawImage(video, 0, 0, cw, ch);
  const imageData = tempCtx.getImageData(0, 0, cw, ch);

  if (phase === 1) {
    // === 第一階段：偵測球 ===
    const ball = detectBall(imageData, cw, ch);

    // 畫搜尋區域
    ctx.beginPath();
    ctx.arc(cw/2, ch/2, Math.min(cw,ch)*0.25, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    ctx.setLineDash([6,4]);
    ctx.stroke();
    ctx.setLineDash([]);

    // 畫虛擬圈圈追蹤球
    const targetX = ball.found ? ball.x : cw/2;
    const targetY = ball.found ? ball.y : ch/2;

    if (!ballPos) ballPos = { x: targetX, y: targetY };
    ballPos.x += (targetX - ballPos.x) * 0.15;
    ballPos.y += (targetY - ballPos.y) * 0.15;

    // 外圈
    ctx.beginPath();
    ctx.arc(ballPos.x, ballPos.y, 36, 0, Math.PI*2);
    ctx.strokeStyle = ball.found ? '#3b82f6' : 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // 內圈
    ctx.beginPath();
    ctx.arc(ballPos.x, ballPos.y, 20, 0, Math.PI*2);
    ctx.strokeStyle = ball.found ? '#60a5fa' : 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // 十字準心
    ctx.strokeStyle = ball.found ? '#3b82f6' : 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(ballPos.x-28, ballPos.y); ctx.lineTo(ballPos.x+28, ballPos.y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ballPos.x, ballPos.y-28); ctx.lineTo(ballPos.x, ballPos.y+28); ctx.stroke();

    if (ball.found) {
      ballConfidence = Math.min(ballConfidence + 1, 30);
      status.textContent = `🎯 偵測到球！確認中 ${Math.round(ballConfidence/30*100)}%`;
    } else {
      ballConfidence = Math.max(ballConfidence - 1, 0);
      status.textContent = '🎯 請將球放置於畫面中央白圈內';
    }

    if (ballConfidence >= 30) {
      ballDetected = true;
      phase = 2;
      updatePhaseUI();
      document.getElementById('mainBtn').textContent = '確認水平';
      document.getElementById('mainBtn').classList.remove('recording');
      status.textContent = '✅ 球已偵測！進入步驟2：請讓棒子與地面平行';
    }

  } else if (phase === 2) {
    // === 第二階段：水平校準 ===
    const now = performance.now();
    const results = poseLandmarker ? poseLandmarker.detectForVideo(video, now) : null;

    // 畫水平參考線
    ctx.beginPath();
    ctx.moveTo(cw * 0.1, ch * 0.5);
    ctx.lineTo(cw * 0.9, ch * 0.5);
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    ctx.setLineDash([8, 6]);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('水平基準線', cw/2, ch*0.5 - 8);

    if (results && results.landmarks && results.landmarks.length > 0) {
      const lm = results.landmarks[0];
      const wristR = lm[16], wristL = lm[15];

      if (wristR && wristL) {
        const rx = wristR.x * cw, ry = wristR.y * ch;
        const lx = wristL.x * cw, ly = wristL.y * ch;

        // 畫棒子連線
        ctx.beginPath();
        ctx.moveTo(lx, ly);
        ctx.lineTo(rx, ry);
        ctx.strokeStyle = '#f59e0b';
        ctx.lineWidth = 3;
        ctx.stroke();

        ctx.beginPath(); ctx.arc(rx, ry, 8, 0, Math.PI*2);
        ctx.fillStyle = '#f59e0b'; ctx.fill();
        ctx.beginPath(); ctx.arc(lx, ly, 8, 0, Math.PI*2);
        ctx.fillStyle = '#f59e0b'; ctx.fill();

        const angleDiff = Math.abs(ry - ly) / cw;
        isLevel = angleDiff < 0.05;

        if (isLevel) {
          levelProgress = Math.min(levelProgress + 1, 40);
          ctx.beginPath();
          ctx.moveTo(lx, ly); ctx.lineTo(rx, ry);
          ctx.strokeStyle = '#22c55e';
          ctx.lineWidth = 4; ctx.stroke();
          status.textContent = `✅ 水平確認中 ${Math.round(levelProgress/40*100)}%`;
        } else {
          levelProgress = Math.max(levelProgress - 1, 0);
          const tilt = ((ry - ly) / cw * 100).toFixed(1);
          status.textContent = `📐 請調整水平，偏差 ${tilt > 0 ? '右高' : '左高'} ${Math.abs(tilt)}%`;
        }

        if (levelProgress >= 40) {
          phase = 3;
          updatePhaseUI();
          document.getElementById('mainBtn').textContent = '開始揮棒';
          status.textContent = '✅ 水平校準完成！準備好後點擊「開始揮棒」';
        }
      } else {
        status.textContent = '📐 請舉起球棒，讓鏡頭看到雙手';
      }
    } else {
      status.textContent = '📐 請舉起球棒，讓鏡頭看到雙手';
    }

  } else if (phase === 3) {
    // === 第三階段：揮棒分析 ===
    const now = performance.now();
    const results = poseLandmarker ? poseLandmarker.detectForVideo(video, now) : null;

    if (results && results.landmarks && results.landmarks.length > 0) {
      const lm = results.landmarks[0];
      const wrist = lm[16];
      const elbow = lm[14];

      if (wrist) {
        const wx = wrist.x * cw, wy = wrist.y * ch;
        let speed = 0;

        if (lastWrist) {
          const dx = wx - lastWrist.x;
          const dy = wy - lastWrist.y;
          speed = Math.sqrt(dx*dx + dy*dy);
          if (speed > maxSpeed) maxSpeed = speed;
        }

        trail.push({ x: wx, y: wy, speed });
        if (trail.length > 80) trail.shift();
        lastWrist = { x: wx, y: wy };

        // 畫軌跡
        for (let i = 1; i < trail.length; i++) {
          const t = trail[i], prev = trail[i-1];
          const age = i / trail.length;
          ctx.beginPath();
          ctx.moveTo(prev.x, prev.y);
          ctx.lineTo(t.x, t.y);
          ctx.strokeStyle = getColor(t.speed);
          ctx.lineWidth = t.speed > 20 ? 5 : 3;
          ctx.globalAlpha = age * 0.85;
          ctx.stroke();
          ctx.globalAlpha = 1;
        }

        // 手腕點
        ctx.beginPath();
        ctx.arc(wx, wy, 7, 0, Math.PI*2);
        ctx.fillStyle = getColor(speed);
        ctx.fill();

        // 擊球瞬間
        if (speed > 20 && !swingDetected) {
          swingDetected = true;
          ctx.beginPath();
          ctx.arc(wx, wy, 22, 0, Math.PI*2);
          ctx.strokeStyle = '#ef4444';
          ctx.lineWidth = 2.5;
          ctx.globalAlpha = 0.8;
          ctx.stroke();
          ctx.globalAlpha = 1;
        }

        // 計算仰角
        let launchAngle = 0;
        if (elbow) {
          const ex = elbow.x * cw, ey = elbow.y * ch;
          launchAngle = Math.round(Math.atan2(ey - wy, wx - ex) * 180 / Math.PI);
        }

        // 計算距離（物理公式）
        const v0 = maxSpeed * 3.5;
        const rad = Math.abs(launchAngle) * Math.PI / 180;
        const dist = Math.round((v0 * v0 * Math.sin(2 * rad)) / 9.8);

        document.getElementById('velo').innerHTML = Math.round(maxSpeed * 4) + '<span style="font-size:11px;color:#666"> px/f</span>';
        document.getElementById('angle').innerHTML = launchAngle + '<span style="font-size:11px;color:#666">°</span>';
        document.getElementById('distance').innerHTML = (dist > 0 ? dist : '—') + '<span style="font-size:11px;color:#666"> m</span>';

        status.textContent = speed > 20 ? '🔴 擊球！' : speed > 8 ? '🟡 加速中' : '🔵 準備期';
      }
    }
  }

  animId = requestAnimationFrame(loop);
}

await startCamera();
await init();
</script>
</body>
</html>
