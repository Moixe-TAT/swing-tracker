<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T座模式</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding-bottom: 40px; }
  .topbar { display: flex; align-items: center; width: 100%; max-width: 480px; padding: 14px; gap: 10px; }
  .back-btn { background: #1a1a1a; border: none; color: #fff; width: 36px; height: 36px; border-radius: 10px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .topbar-title { font-size: 16px; font-weight: 600; }
  .topbar-badge { margin-left: auto; background: #1a1a1a; border-radius: 20px; padding: 4px 12px; font-size: 12px; color: #888; }

  #container { position: relative; width: 100%; max-width: 480px; }
  video { width: 100%; display: block; }
  canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

  .rec-indicator { position: absolute; top: 10px; right: 10px; background: rgba(239,68,68,0.85); color: #fff; font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px; display: none; align-items: center; gap: 6px; }
  .rec-dot { width: 8px; height: 8px; border-radius: 50%; background: #fff; animation: blink 0.8s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  .countdown { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6); color: #fff; font-size: 13px; font-weight: 600; padding: 4px 10px; border-radius: 20px; display: none; }

  .status-bar { width: 100%; max-width: 480px; padding: 10px 14px; }
  .status-text { font-size: 13px; color: #f59e0b; min-height: 20px; }

  .phase-indicator { display: flex; gap: 8px; width: 100%; max-width: 480px; padding: 0 14px 10px; }
  .phase { flex: 1; padding: 8px; border-radius: 10px; background: #1a1a1a; text-align: center; font-size: 11px; color: #555; transition: all 0.3s; }
  .phase.active { color: #fff; }
  .phase-1.active { background: #1d3a5f; color: #3b82f6; }
  .phase-2.active { background: #3d2800; color: #f59e0b; }
  .phase-3.active { background: #3d0000; color: #ef4444; }

  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; max-width: 480px; padding: 0 14px; }
  .stat { background: #1a1a1a; border-radius: 10px; padding: 12px; text-align: center; }
  .stat-label { font-size: 11px; color: #666; margin-bottom: 4px; }
  .stat-value { font-size: 20px; font-weight: 500; }

  .legend { display: flex; gap: 14px; padding: 10px 14px; }
  .leg { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #666; }
  .dot { width: 18px; height: 3px; border-radius: 2px; }

  .btns { display: flex; gap: 10px; padding: 10px 14px; width: 100%; max-width: 480px; }
  button.main { flex: 2; padding: 14px; border-radius: 12px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; background: #fff; color: #000; }
  button.sub { flex: 1; padding: 14px; border-radius: 12px; border: none; font-size: 14px; cursor: pointer; background: #1a1a1a; color: #fff; }
  button.recording { background: #ef4444; color: #fff; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  /* 列表 */
  .list-title { width: 100%; max-width: 480px; padding: 4px 14px 10px; font-size: 13px; color: #666; font-weight: 500; }
  .swing-list { width: 100%; max-width: 480px; padding: 0 14px; display: flex; flex-direction: column; gap: 10px; }
  .swing-item { background: #1a1a1a; border-radius: 12px; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
  .swing-item-top { display: flex; align-items: center; gap: 10px; }
  .swing-num { background: #333; border-radius: 8px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .swing-stats { display: flex; gap: 12px; flex: 1; }
  .swing-stat { display: flex; flex-direction: column; }
  .swing-stat-label { font-size: 10px; color: #555; }
  .swing-stat-value { font-size: 14px; font-weight: 600; color: #fff; }
  .swing-item-btns { display: flex; gap: 8px; }
  .play-btn { flex: 1; padding: 8px; border-radius: 8px; border: none; background: #252525; color: #fff; font-size: 13px; cursor: pointer; }
  .dl-btn { flex: 1; padding: 8px; border-radius: 8px; border: none; background: #252525; color: #3b82f6; font-size: 13px; cursor: pointer; }

  /* 彈窗 */
  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; z-index: 99; padding: 20px; }
  .modal.show { display: flex; }
  .modal-box { background: #1a1a1a; border-radius: 16px; padding: 16px; width: 100%; max-width: 440px; }
  .modal-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .modal-title { font-size: 15px; font-weight: 600; }
  .modal-close { background: #333; border: none; color: #fff; width: 30px; height: 30px; border-radius: 8px; font-size: 16px; cursor: pointer; }
  .modal-video { width: 100%; border-radius: 10px; background: #000; }
  .modal-dl { width: 100%; margin-top: 10px; padding: 12px; border-radius: 10px; border: none; background: #3b82f6; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; }
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="location.href='index.html'">←</button>
  <span class="topbar-title">⚾ T座模式</span>
  <span class="topbar-badge" id="step-badge">步驟 1／3</span>
</div>

<div id="container">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div class="rec-indicator" id="rec-indicator"><div class="rec-dot"></div> REC</div>
  <div class="countdown" id="countdown"></div>
</div>

<div class="status-bar">
  <div class="status-text" id="status">載入中，請稍候...</div>
</div>

<div class="phase-indicator">
  <div class="phase phase-1 active" id="ph1">① 對準球</div>
  <div class="phase phase-2" id="ph2">② 校準水平</div>
  <div class="phase phase-3" id="ph3">③ 揮棒分析</div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-label">擊球初速</div><div class="stat-value" id="velo">—</div></div>
  <div class="stat"><div class="stat-label">擊球仰角</div><div class="stat-value" id="angle">—</div></div>
  <div class="stat"><div class="stat-label">預測距離</div><div class="stat-value" id="distance">—</div></div>
</div>

<div class="legend">
  <div class="leg"><div class="dot" style="background:#3b82f6"></div>準備期</div>
  <div class="leg"><div class="dot" style="background:#f59e0b"></div>加速期</div>
  <div class="leg"><div class="dot" style="background:#ef4444"></div>擊球點</div>
</div>

<div class="btns">
  <button class="main" id="mainBtn" onclick="handleMain()">開始偵測球</button>
  <button class="sub" onclick="resetAll()">重置</button>
</div>

<div class="list-title" id="list-title" style="display:none">📋 揮棒紀錄</div>
<div class="swing-list" id="swing-list"></div>

<!-- 回放彈窗 -->
<div class="modal" id="modal">
  <div class="modal-box">
    <div class="modal-top">
      <span class="modal-title" id="modal-title">第1次揮棒</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <video class="modal-video" id="modal-video" controls playsinline></video>
    <button class="modal-dl" id="modal-dl-btn">⬇ 下載影片</button>
  </div>
</div>

<script type="module">
import { PoseLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const status = document.getElementById('status');

let poseLandmarker = null;
let phase = 1;
let tracking = false;
let animId = null;
let ballPos = null;
let ballConfidence = 0;
let isLevel = false;
let levelProgress = 0;
let trail = [];
let lastWrist = null;
let maxSpeed = 0;
let swingStart = null;
let swingDetected = false;
let swingCount = 0;
let isRecording = false;
let mediaRecorder = null;
let recordedChunks = [];
let swingRecords = [];
let countdownInterval = null;
let finalVelo = 0, finalAngle = 0, finalDist = 0;

async function init() {
  try {
    const vision = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
    );
    poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",
        delegate: "GPU"
      },
      runningMode: "VIDEO",
      numPoses: 1
    });
    status.textContent = '✅ 準備完成，點擊「開始偵測球」';
  } catch(e) {
    status.textContent = '⚠️ 載入失敗，請重新整理';
  }
}

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: 640, height: 480 }
    });
    video.srcObject = stream;
    await new Promise(r => video.onloadedmetadata = r);
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
  } catch(e) {
    status.textContent = '⚠️ 無法開啟鏡頭，請允許相機權限';
  }
}

// 開始錄影
function startRecording() {
  try {
    const stream = video.srcObject;
    recordedChunks = [];
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.start();
    isRecording = true;
    document.getElementById('rec-indicator').style.display = 'flex';

    let secs = 6;
    const cd = document.getElementById('countdown');
    cd.style.display = 'block';
    cd.textContent = `⏱ ${secs}s`;
    countdownInterval = setInterval(() => {
      secs--;
      cd.textContent = `⏱ ${secs}s`;
      if (secs <= 0) stopRecording();
    }, 1000);
  } catch(e) {
    status.textContent = '⚠️ 錄影失敗';
  }
}

function stopRecording() {
  clearInterval(countdownInterval);
  document.getElementById('countdown').style.display = 'none';
  document.getElementById('rec-indicator').style.display = 'none';
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
    mediaRecorder.onstop = () => saveRecord();
  }
  isRecording = false;
}

function saveRecord() {
  const blob = new Blob(recordedChunks, { type: 'video/webm' });
  const url = URL.createObjectURL(blob);
  swingCount++;
  const record = {
    num: swingCount,
    velo: finalVelo,
    angle: finalAngle,
    dist: finalDist,
    url: url,
    blob: blob
  };
  swingRecords.push(record);
  addRecordToList(record);

  // 重置第三階段，等下次揮棒
  trail = [];
  lastWrist = null;
  maxSpeed = 0;
  swingDetected = false;
  finalVelo = 0; finalAngle = 0; finalDist = 0;
  status.textContent = `✅ 第${swingCount}次完成！再次揮棒繼續紀錄`;
  document.getElementById('mainBtn').textContent = '再次揮棒';
  document.getElementById('mainBtn').disabled = false;
}

function addRecordToList(record) {
  document.getElementById('list-title').style.display = 'block';
  const list = document.getElementById('swing-list');
  const item = document.createElement('div');
  item.className = 'swing-item';
  item.innerHTML = `
    <div class="swing-item-top">
      <div class="swing-num">${record.num}</div>
      <div class="swing-stats">
        <div class="swing-stat"><span class="swing-stat-label">初速</span><span class="swing-stat-value">${record.velo} px/f</span></div>
        <div class="swing-stat"><span class="swing-stat-label">仰角</span><span class="swing-stat-value">${record.angle}°</span></div>
        <div class="swing-stat"><span class="swing-stat-label">距離</span><span class="swing-stat-value">${record.dist > 0 ? record.dist + 'm' : '—'}</span></div>
      </div>
    </div>
    <div class="swing-item-btns">
      <button class="play-btn" onclick="playRecord(${record.num - 1})">▶ 回放</button>
      <button class="dl-btn" onclick="downloadRecord(${record.num - 1})">⬇ 下載</button>
    </div>
  `;
  list.insertBefore(item, list.firstChild);
}

window.playRecord = function(index) {
  const record = swingRecords[index];
  document.getElementById('modal-title').textContent = `第${record.num}次揮棒`;
  const mv = document.getElementById('modal-video');
  mv.src = record.url;
  mv.play();
  document.getElementById('modal-dl-btn').onclick = () => downloadRecord(index);
  document.getElementById('modal').classList.add('show');
}

window.downloadRecord = function(index) {
  const record = swingRecords[index];
  const a = document.createElement('a');
  a.href = record.url;
  a.download = `揮棒第${record.num}次.webm`;
  a.click();
}

window.closeModal = function() {
  const mv = document.getElementById('modal-video');
  mv.pause();
  document.getElementById('modal').classList.remove('show');
}

window.handleMain = function() {
  if (phase === 1) {
    tracking = true;
    document.getElementById('mainBtn').textContent = '偵測中...';
    document.getElementById('mainBtn').disabled = true;
    status.textContent = '🎯 請將球放置於畫面中央白圈內';
    loop();
  } else if (phase === 2) {
    status.textContent = '📐 請舉起球棒，讓鏡頭看到雙手';
  } else if (phase === 3) {
    trail = [];
    lastWrist = null;
    maxSpeed = 0;
    swingDetected = false;
    status.textContent = '🔴 準備好後揮棒！自動錄影6秒';
    document.getElementById('mainBtn').disabled = true;
    document.getElementById('mainBtn').textContent = '錄影中...';
    startRecording();
  }
}

window.resetAll = function() {
  phase = 1;
  tracking = false;
  ballPos = null;
  ballConfidence = 0;
  isLevel = false;
  levelProgress = 0;
  trail = [];
  lastWrist = null;
  maxSpeed = 0;
  swingDetected = false;
  if (isRecording) stopRecording();
  cancelAnimationFrame(animId);
  updatePhaseUI();
  document.getElementById('mainBtn').textContent = '開始偵測球';
  document.getElementById('mainBtn').classList.remove('recording');
  document.getElementById('mainBtn').disabled = false;
  document.getElementById('velo').textContent = '—';
  document.getElementById('angle').textContent = '—';
  document.getElementById('distance').textContent = '—';
  document.getElementById('step-badge').textContent = '步驟 1／3';
  status.textContent = '✅ 已重置，點擊「開始偵測球」';
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function updatePhaseUI() {
  ['ph1','ph2','ph3'].forEach((id, i) => {
    document.getElementById(id).classList.toggle('active', i + 1 === phase);
  });
  document.getElementById('step-badge').textContent = `步驟 ${phase}／3`;
}

function getColor(speed) {
  if (speed < 8) return '#3b82f6';
  if (speed < 20) return '#f59e0b';
  return '#ef4444';
}

function detectBall(imageData, cw, ch) {
  const cx = cw / 2, cy = ch / 2;
  const searchR = Math.min(cw, ch) * 0.25;
  const data = imageData.data;
  let brightCount = 0, bx = 0, by = 0;
  for (let y = cy - searchR; y < cy + searchR; y += 4) {
    for (let x = cx - searchR; x < cx + searchR; x += 4) {
      const i = (Math.floor(y) * cw + Math.floor(x)) * 4;
      const brightness = (data[i] + data[i+1] + data[i+2]) / 3;
      const dist = Math.sqrt((x-cx)**2 + (y-cy)**2);
      if (brightness > 160 && dist < searchR) { brightCount++; bx += x; by += y; }
    }
  }
  return brightCount > 10 ? { x: bx/brightCount, y: by/brightCount, found: true } : { x: cx, y: cy, found: false };
}

function loop() {
  if (!tracking) return;
  if (video.readyState < 2) { animId = requestAnimationFrame(loop); return; }

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const cw = canvas.width, ch = canvas.height;

  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = cw; tempCanvas.height = ch;
  const tempCtx = tempCanvas.getContext('2d');
  tempCtx.drawImage(video, 0, 0, cw, ch);
  const imageData = tempCtx.getImageData(0, 0, cw, ch);

  if (phase === 1) {
    const ball = detectBall(imageData, cw, ch);
    ctx.beginPath();
    ctx.arc(cw/2, ch/2, Math.min(cw,ch)*0.25, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1; ctx.setLineDash([6,4]); ctx.stroke(); ctx.setLineDash([]);

    const targetX = ball.found ? ball.x : cw/2;
    const targetY = ball.found ? ball.y : ch/2;
    if (!ballPos) ballPos = { x: targetX, y: targetY };
    ballPos.x += (targetX - ballPos.x) * 0.15;
    ballPos.y += (targetY - ballPos.y) * 0.15;

    ctx.beginPath(); ctx.arc(ballPos.x, ballPos.y, 36, 0, Math.PI*2);
    ctx.strokeStyle = ball.found ? '#3b82f6' : 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 2; ctx.stroke();
    ctx.beginPath(); ctx.arc(ballPos.x, ballPos.y, 20, 0, Math.PI*2);
    ctx.strokeStyle = ball.found ? '#60a5fa' : 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 1.5; ctx.stroke();
    ctx.strokeStyle = ball.found ? '#3b82f6' : 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(ballPos.x-28, ballPos.y); ctx.lineTo(ballPos.x+28, ballPos.y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ballPos.x, ballPos.y-28); ctx.lineTo(ballPos.x, ballPos.y+28); ctx.stroke();

    if (ball.found) {
      ballConfidence = Math.min(ballConfidence + 1, 30);
      status.textContent = `🎯 偵測到球！確認中 ${Math.round(ballConfidence/30*100)}%`;
    } else {
      ballConfidence = Math.max(ballConfidence - 1, 0);
      status.textContent = '🎯 請將球放置於畫面中央白圈內';
    }

    if (ballConfidence >= 30) {
      phase = 2; updatePhaseUI();
      document.getElementById('mainBtn').textContent = '確認水平';
      document.getElementById('mainBtn').disabled = false;
      status.textContent = '✅ 球已偵測！步驟2：舉起球棒校準水平';
    }

  } else if (phase === 2) {
    const now = performance.now();
    const results = poseLandmarker ? poseLandmarker.detectForVideo(video, now) : null;

    ctx.beginPath(); ctx.moveTo(cw*0.1, ch*0.5); ctx.lineTo(cw*0.9, ch*0.5);
    ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1;
    ctx.setLineDash([8,6]); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.font = '11px sans-serif';
    ctx.textAlign = 'center'; ctx.fillText('水平基準線', cw/2, ch*0.5 - 8);

    if (results && results.landmarks && results.landmarks.length > 0) {
      const lm = results.landmarks[0];
      const wristR = lm[16], wristL = lm[15];
      if (wristR && wristL) {
        const rx = wristR.x*cw, ry = wristR.y*ch;
        const lx = wristL.x*cw, ly = wristL.y*ch;
        const angleDiff = Math.abs(ry - ly) / cw;
        isLevel = angleDiff < 0.05;

        ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(rx, ry);
        ctx.strokeStyle = isLevel ? '#22c55e' : '#f59e0b';
        ctx.lineWidth = 3; ctx.stroke();
        ctx.beginPath(); ctx.arc(rx, ry, 8, 0, Math.PI*2); ctx.fillStyle = isLevel ? '#22c55e' : '#f59e0b'; ctx.fill();
        ctx.beginPath(); ctx.arc(lx, ly, 8, 0, Math.PI*2); ctx.fill();

        if (isLevel) {
          levelProgress = Math.min(levelProgress + 1, 40);
          status.textContent = `✅ 水平確認中 ${Math.round(levelProgress/40*100)}%`;
        } else {
          levelProgress = Math.max(levelProgress - 1, 0);
          status.textContent = `📐 調整球棒水平，目前偏差 ${(angleDiff*100).toFixed(1)}%`;
        }

        if (levelProgress >= 40) {
          phase = 3; updatePhaseUI();
          document.getElementById('mainBtn').textContent = '開始揮棒';
          document.getElementById('mainBtn').disabled = false;
          status.textContent = '✅ 水平校準完成！點擊「開始揮棒」自動錄影6秒';
        }
      } else {
        status.textContent = '📐 請舉起球棒，讓鏡頭看到雙手';
      }
    }

  } else if (phase === 3) {
    const now = performance.now();
    const results = poseLandmarker ? poseLandmarker.detectForVideo(video, now) : null;

    if (results && results.landmarks && results.landmarks.length > 0) {
      const lm = results.landmarks[0];
      const wrist = lm[16];
      const elbow = lm[14];

      if (wrist) {
        const wx = wrist.x * cw, wy = wrist.y * ch;
        let speed = 0;
        if (lastWrist) {
          const dx = wx - lastWrist.x, dy = wy - lastWrist.y;
          speed = Math.sqrt(dx*dx + dy*dy);
          if (speed > maxSpeed) maxSpeed = speed;
        }

        trail.push({ x: wx, y: wy, speed });
        if (trail.length > 80) trail.shift();
        lastWrist = { x: wx, y: wy };

        for (let i = 1; i < trail.length; i++) {
          const t = trail[i], prev = trail[i-1];
          const age = i / trail.length;
          ctx.beginPath(); ctx.moveTo(prev.x, prev.y); ctx.lineTo(t.x, t.y);
          ctx.strokeStyle = getColor(t.speed);
          ctx.lineWidth = t.speed > 20 ? 5 : 3;
          ctx.globalAlpha = age * 0.85; ctx.stroke(); ctx.globalAlpha = 1;
        }

        ctx.beginPath(); ctx.arc(wx, wy, 7, 0, Math.PI*2);
        ctx.fillStyle = getColor(speed); ctx.fill();

        if (speed > 20 && !swingDetected) {
          swingDetected = true;
          ctx.beginPath(); ctx.arc(wx, wy, 22, 0, Math.PI*2);
          ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 2.5;
          ctx.globalAlpha = 0.8; ctx.stroke(); ctx.globalAlpha = 1;
        }

        let launchAngle = 0;
        if (elbow) {
          const ex = elbow.x*cw, ey = elbow.y*ch;
          launchAngle = Math.round(Math.atan2(ey - wy, wx - ex) * 180 / Math.PI);
        }

        const v0 = maxSpeed * 3.5;
        const rad = Math.abs(launchAngle) * Math.PI / 180;
        const dist = Math.round((v0 * v0 * Math.sin(2 * rad)) / 9.8);

        finalVelo = Math.round(maxSpeed * 4);
        finalAngle = launchAngle;
        finalDist = dist;

        document.getElementById('velo').textContent = finalVelo + ' px/f';
        document.getElementById('angle').textContent = finalAngle + '°';
        document.getElementById('distance').textContent = (finalDist > 0 ? finalDist + ' m' : '—');

        status.textContent = speed > 20 ? '🔴 擊球！' : speed > 8 ? '🟡 加速中' : '🔵 準備期';
      }
    }
  }

  animId = requestAnimationFrame(loop);
}

await startCamera();
await init();
</script>
</body>
</html>
