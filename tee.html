<script type="module">
import { PoseLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

/* =========================
   DOM
========================= */
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const tmpCanvas = document.createElement('canvas');
const tmpCtx = tmpCanvas.getContext('2d');
const status = document.getElementById('status');
const mainBtn = document.getElementById('mainBtn');

/* =========================
   CORE STATE
========================= */
let poseLandmarker = null;
let phase = 1;
let tracking = false;
let animId = null;
let handedness = 'right';

/* =========================
   GYRO
========================= */
let deviceTilt = 0;
let levelOK = false;
let levelConfidence = 0;
let gyroEnabled = false;

function handleOrientation(e) {
  deviceTilt = e.gamma || 0;
}

window.requestGyro = function () {
  const enable = () => {
    window.addEventListener('deviceorientation', handleOrientation);
    gyroEnabled = true;
    const btn = document.getElementById('gyro-btn');
    btn.textContent = '✅ 水平感應已啟用';
    btn.disabled = true;
  };

  if (DeviceOrientationEvent?.requestPermission) {
    DeviceOrientationEvent.requestPermission().then(res => {
      if (res === 'granted') enable();
    });
  } else {
    enable();
  }
};

/* =========================
   BALL DETECTION STATE
========================= */
let ballOK = false;
let ballConfidence = 0;
let ballPos = null;
let pixelsPerCm = 0;

let stableBallFrames = 0;
let lastBall = null;

/* =========================
   SWING STATE
========================= */
let trail = [];
let lastWrist = null;
let lastTime = 0;
let maxSpeed = 0;
let swingDetected = false;

let finalVelo = 0;
let finalAngle = 0;
let finalDist = 0;

/* =========================
   RECORDING
========================= */
let isRecording = false;
let mediaRecorder = null;
let recordedChunks = [];

/* =========================
   LIST
========================= */
let swingRecords = [];
let totalSlots = 5;

/* =========================
   CAMERA
========================= */
async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'environment' }
  });

  video.srcObject = stream;
  await new Promise(r => video.onloadedmetadata = r);

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
}

/* =========================
   BALL DETECTION (clean)
========================= */
function detectWhiteBall(imageData, cw, ch) {
  const cx = cw / 2;
  const cy = ch / 2;
  const baseR = Math.min(cw, ch) * 0.22;

  const data = imageData.data;

  let count = 0;
  let bx = 0, by = 0;

  let minX = cw, maxX = 0, minY = ch, maxY = 0;

  for (let y = cy - baseR; y < cy + baseR; y += 2) {
    for (let x = cx - baseR; x < cx + baseR; x += 2) {

      const xi = x | 0;
      const yi = y | 0;
      if (xi < 0 || yi < 0 || xi >= cw || yi >= ch) continue;

      const i = (yi * cw + xi) * 4;
      const r = data[i];
      const g = data[i + 1];
      const b = data[i + 2];

      const brightness = (r + g + b) / 3;

      const isWhite =
        brightness > 200 &&
        Math.max(r, g, b) - Math.min(r, g, b) < 35;

      if (!isWhite) continue;

      count++;
      bx += x;
      by += y;

      if (x < minX) minX = x;
      if (x > maxX) maxX = x;
      if (y < minY) minY = y;
      if (y > maxY) maxY = y;
    }
  }

  if (count < 25) return { found: false };

  const w = maxX - minX;
  const h = maxY - minY;

  if (!w || !h) return { found: false };

  const roundness = Math.min(w, h) / Math.max(w, h);
  const density = count / (w * h);

  if (roundness < 0.65) return { found: false };
  if (density < 0.08) return { found: false };

  return {
    found: true,
    x: bx / count,
    y: by / count,
    diameter: Math.max(w, h)
  };
}

/* =========================
   LOOP
========================= */
function loop() {
  const cw = canvas.width;
  const ch = canvas.height;

  ctx.drawImage(video, 0, 0, cw, ch);

  const now = performance.now();

  /* ========= PHASE 1 ========= */
  if (phase === 1) {

    tmpCanvas.width = cw;
    tmpCanvas.height = ch;
    tmpCtx.drawImage(video, 0, 0, cw, ch);

    const imageData = tmpCtx.getImageData(0, 0, cw, ch);
    const ball = detectWhiteBall(imageData, cw, ch);

    if (ball.found) {
      stableBallFrames++;
      lastBall = ball;
    } else {
      stableBallFrames = Math.max(0, stableBallFrames - 2);
    }

    ballOK = stableBallFrames >= 3;

    ctx.beginPath();
    ctx.arc(ball.x || cw/2, ball.y || ch/2, 34, 0, Math.PI * 2);
    ctx.strokeStyle = ball.found ? '#ef4444' : 'rgba(255,60,60,0.25)';
    ctx.lineWidth = 3;
    ctx.stroke();

    const tiltOK = Math.abs(deviceTilt) < 3;

    levelOK = gyroEnabled && tiltOK;

    mainBtn.disabled = !(ballOK && levelOK);
    mainBtn.textContent = ballOK && levelOK ? '✅ 開始揮棒' : '偵測中...';

  }

  /* ========= PHASE 2 ========= */
  if (phase === 2 && poseLandmarker) {

    const results = poseLandmarker.detectForVideo(video, now);

    if (results.landmarks?.length) {

      const lm = results.landmarks[0];

      const wrist = lm[handedness === 'right' ? 16 : 15];

      if (wrist) {

        const wx = wrist.x * cw;
        const wy = wrist.y * ch;

        let speed = 0;

        if (lastWrist) {
          const dx = wx - lastWrist.x;
          const dy = wy - lastWrist.y;
          const dt = (now - lastTime) / 1000;
          speed = Math.sqrt(dx*dx + dy*dy) / dt;
        }

        maxSpeed = Math.max(maxSpeed, speed);

        lastWrist = { x: wx, y: wy };
        lastTime = now;

        ctx.beginPath();
        ctx.arc(wx, wy, 6, 0, Math.PI*2);
        ctx.fillStyle = '#22c55e';
        ctx.fill();

        finalVelo = Math.round(maxSpeed * 0.036);
      }
    }
  }

  animId = requestAnimationFrame(loop);
}

/* =========================
   INIT
========================= */
async function init() {
  const vision = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
  );

  poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath:
        "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",
      delegate: "GPU"
    },
    runningMode: "VIDEO"
  });

  tracking = true;
  loop();
}

/* =========================
   START
========================= */
startCamera();
init();

</script>
